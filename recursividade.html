    <meta charset="UTF-8">
    <title>Recursividade</title>

    <script>
       
       function fatorial(x){
	if(x<1){
	return 1
	} else{
	return x*fatorial(x-1) //AQUI ESTOU CHAMANDO A FUNCAO DENTRO DELA MESMA
	}
	
   }

console.log (fatorial(7))

    </script>
