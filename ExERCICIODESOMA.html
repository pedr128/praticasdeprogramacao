<!doctype html>
<html>
    <head>
        <meta charset=""utf-8" />
        
    </head>
        <title> JAVA SCRIPT</title>

        <script>
          //entrada de dados
          const n1 = parseInt(prompt("Digite o numero 1"));
          const n2 = parseInt(prompt("Digite o numero 2"));  
            //processamento (cáculos)
          const soma = n1 + n2;
            /* 
        o operador + é utilizado para concatenar strings, ou seja,
         juntar as duas entradas como texto. Para realizar a soma
          de números, é necessário converter as entradas para o tipo
             numérico utilizando a função parseFloat() ou parseInt().             
            ou seja ele recebeu como texto porem se ele estivesse direto 
            exemplo const n1 = 10 e const n2 = 7 ele iria somar normalmente,
             mas como ele recebeu como texto ele vai juntar os dois textos,
              ou seja "10" + "7" vai resultar em "107" que é a concatenação 
              dos dois textos. Para corrigir isso, é necessário converter as
               entradas para números antes de realizar a soma, 
               por exemplo: const soma = parseFloat(n1) + parseFloat(n2);
            */


          ///saída de dados
            console.log("A soma é: " + soma);
        </script>

    <body>
     
    </body> 
</html>
