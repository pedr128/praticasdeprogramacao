        <title> JAVA SCRIPT</title>

        <script>

           // const Nome = prompt("Digite seu nome");

            const n1 = 10   //prompt("Digite número 1");
            const n2 = 7   //prompt("Digite número 2");
            const aprovado = true;
            const minimo = 9;

            console.log("Operadores Aritméticos");
            console.log(n1 + n2);
            console.log(n1 - n2);
            console.log(n1 * n2);
            console.log(n1 / n2);
            console.log(n1 % n2); // resto da divisão
            console.log(n1 ** n2); // potenciação   

            console.log("Operadores de comparação relacional");
            console.log(n1 == n2); // igual
            console.log(n1 != n2); // diferente
            console.log(n1 > n2); // maior
            console.log(n1 < n2); // menor
            console.log(n1 >= n2); // maior ou igual
            console.log(n1 <= n2); // menor ou igual

               console.log("Operadores Lógicos");
               console.log(aprovado);
               console.log(!aprovado); // operador lógico NOT (NÃO) - retorna true se a expressão for falsa
                console.log(n2>= 7 && n2 >= minimo); // operador lógico AND (E) - retorna true se ambas as expressões forem verdadeiras
                console.log(n2>= 7 || n2 >= minimo); // operador lógico OR (OU) - retorna true se pelo menos uma das expressões for verdadeira
              // console.log(n1 > n2 && n1 != n2); // operador lógico AND (E) - retorna true se ambas as expressões forem verdadeiras
              // console.log(n1 > n2 || n1 != n2); // operador lógico OR (OU) - retorna true se pelo menos uma das expressões for verdadeira
              // console.log(!(n1 > n2)); // operador lógico NOT (NÃO) - retorna true se a expressão for falsa
        </script>
