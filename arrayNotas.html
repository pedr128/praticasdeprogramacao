    <meta charset="UTF-8">
    <title>Arrays Notas</title>
        
        
        <script>
           const notas = []
           const qtd = parseInt(prompt('Digite a quantidade de notas que deseja inserir:'))
          
          
           for(let i=0; i< qtd; i++){
            let nota = prompt('Digite nota do aluno')
            notas.push(nota)
 }

           console.table(notas);
        
        </script>
