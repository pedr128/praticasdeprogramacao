<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        
    </head>
        <title> JAVA SCRIPT</title>

        <script>
        
        function somar(){
        const n1 = document.getElementById('n1').value;
        const n2 = document.getElementById('n2').value;
        
        const soma= parseFloat(n1) + parseFloat(n2);
        const resultado = document.getElementById('resultado');
               
          
        resultado.innerHTML = "O resultado do Exercício de Soma é: " + soma; // innerHTML é 
        // uma propriedade que permite acessar ou modificar o conteúdo HTML de um elemento.
        }
     
        </script>

    <body>

         <form action="">
          N1 = <input type="text" id="n1"/><br>
          N2 = <input type="text" id="n2"/><br>
          <input type="button" value="somar" onclick="somar()">
        <h1 id="resultado">O resultado do Exercício de Soma </h1>
         
        
        
        </form>
     
    </body> 
</html>
