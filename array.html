<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8">
    <title>Arrays</title>
        
        
        <script>
            const carros = ["BMW", "Mercedes", "Audi"];
            
            carros.push("Ferrari"); // Adiciona um elemento ao final do array
            carros.push("Lamborghini"); // Adiciona outro elemento ao final do array
            carros.unshift("Porsche"); // Adiciona um elemento ao início do array
            console.table(carros);

        </script>



    </head>

        </body>
</html>
